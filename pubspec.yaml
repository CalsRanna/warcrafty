name: warcrafty
description: A high-performance Dart library for reading and writing World of Warcraft DBC files.
version: 2.0.0
repository: https://github.com/calsranna/warcrafty
homepage: https://github.com/calsranna/warcrafty
issue_tracker: https://github.com/calsranna/warcrafty/issues

environment:
  sdk: ^3.10.0

hooks:
  user_defines:
    warcrafty:
      brew: true

dependencies:
  ffi: ^2.1.0
  hooks: ^2.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
